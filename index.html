<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>보험점검 상담 신청</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family: Arial, sans-serif;
      background:#f4f7fb;
      color:#111;
    }

    .hero{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:40px;
      background:linear-gradient(135deg,#0f2f5f,#1557a6);
      color:white;
    }

    .box{
      max-width:700px;
    }

    h1{
      font-size:48px;
      line-height:1.3;
      margin-bottom:24px;
    }

    p{
      font-size:20px;
      line-height:1.7;
      margin-bottom:32px;
    }

    .btn{
      display:inline-block;
      padding:18px 34px;
      border-radius:14px;
      background:white;
      color:#0f2f5f;
      font-weight:bold;
      text-decoration:none;
      font-size:18px;
    }

    @media(max-width:768px){
      h1{
        font-size:34px;
      }

      p{
        font-size:17px;
      }
    }
  </style>
</head>

<body>

<section class="hero">
  <div class="box">
    <h1>
      지금 내 보험,<br>
      제대로 준비되어 있을까요?
    </h1>

    <p>
      매달 내는 보험료는 적절한지,<br>
      보장은 부족하지 않은지,<br>
      불필요한 중복은 없는지<br><br>

      쉽고 명확하게 점검해드립니다.
    </p>

    <a href="#" class="btn">
      무료 보험점검 신청하기
    </a>
  </div>
</section>

</body>
</html>
