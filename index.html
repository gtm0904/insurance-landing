<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>보험점검 상담</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, 'Apple SD Gothic Neo', sans-serif;
      background: #f4f7fb;
      color: #111827;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 22px;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.18), transparent 34%),
        linear-gradient(135deg, #071f44, #0f3f7a 55%, #1557a6);
      color: white;
    }

    .hero-box {
      width: 100%;
      max-width: 820px;
      text-align: center;
    }

    .badge {
      display: inline-block;
      padding: 9px 16px;
      margin-bottom: 24px;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      color: #eaf3ff;
      font-size: 14px;
      letter-spacing: -0.2px;
    }

    h1 {
      font-size: 52px;
      line-height: 1.22;
      letter-spacing: -2px;
      margin-bottom: 24px;
      font-weight: 800;
    }

    .sub {
      max-width: 660px;
      margin: 0 auto 26px;
      font-size: 20px;
      line-height: 1.75;
      color: #e6eef8;
      letter-spacing: -0.5px;
    }

    .promise {
      max-width: 620px;
      margin: 0 auto 36px;
      padding: 18px 20px;
      border-radius: 18px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      color: #ffffff;
      font-size: 17px;
      line-height: 1.7;
    }

    .btn {
      display: inline-block;
      padding: 18px 34px;
      border-radius: 14px;
      background: #ffffff;
      color: #0f2f5f;
      font-size: 18px;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 14px 34px rgba(0,0,0,0.18);
      transition: 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 42px rgba(0,0,0,0.24);
    }

    .mini {
      margin-top: 18px;
      font-size: 13px;
      color: #cfe0f5;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 38px;
        letter-spacing: -1.3px;
      }

      .sub {
        font-size: 17px;
      }

      .promise {
        font-size: 15px;
      }

      .btn {
        width: 100%;
        max-width: 320px;
        padding: 17px 20px;
      }
    }
  </style>
</head>

<body>
  <section class="hero">
    <div class="hero-box">
      <div class="badge">무료 보험점검 상담</div>

      <h1>
        지금 내 보험,<br>
        그냥 두고 계신가요?
      </h1>

      <p class="sub">
        매달 나가는 보험료,<br>
        정말 필요한 보장인지 한 번쯤 확인해볼 필요가 있습니다.
      </p>

      <div class="promise">
        부담스러운 가입 권유보다<br>
        현재 보험 상태를 먼저 점검해드립니다.
      </div>

      <a href="#" class="btn">
        카톡으로 보험점검 받기
      </a>

      <p class="mini">
        상담 전 상품 가입을 전제로 하지 않습니다.
      </p>
    </div>
  </section>
</body>
</html>
